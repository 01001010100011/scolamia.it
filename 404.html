<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errore 404 - scola-mia.com</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon-scola-mia.svg" />
  <meta name="description" content="Pagina non trovata." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { accent: "#0c7ff2", paper: "#f4f3ee", ink: "#101010" },
          fontFamily: { display: ["Bebas Neue", "sans-serif"], body: ["IBM Plex Sans", "sans-serif"] },
          boxShadow: { brutal: "4px 4px 0 0 #000" }
        }
      }
    };
  </script>
  <style>
    body { font-family: "IBM Plex Sans", sans-serif; background: #f4f3ee; }
    .headline { font-family: "Bebas Neue", sans-serif; letter-spacing: 0.04em; }
  </style>
</head>
<body class="min-h-screen bg-paper text-ink">
  <main class="min-h-screen flex flex-col items-center justify-center px-4 text-center">
    <h1 class="headline text-7xl md:text-8xl leading-none">Errore 404</h1>
    <a href="/" class="mt-6 border-2 border-black bg-accent text-white px-6 py-2.5 text-sm font-bold uppercase shadow-brutal">Torna alla Home</a>
  </main>
  <script>
    (function handleArticleRedirectFrom404() {
      try {
        const match = window.location.pathname.match(/^\/articoli\/([^/]+)\/?$/);
        if (!match) return;
        const raw = decodeURIComponent(match[1] || "");
        const id = raw.split("-")[0];
        if (!/^[0-9a-fA-F-]{36}$/.test(id)) return;
        const slug = raw.slice(id.length + 1);
        const params = new URLSearchParams();
        params.set("id", id);
        if (slug) params.set("slug", slug);
        window.location.replace(`/article/?${params.toString()}`);
      } catch (_) {
        // no-op: keep regular 404 fallback
      }
    })();
  </script>
</body>
</html>
